name: Build

on:
  # Build every pull request so code is verified BEFORE it merges.
  pull_request:
  # Build direct pushes to main only when they touch code. Doc, workflow, and
  # config-only commits skip the build (no point rebuilding the mod for a README
  # or CI tweak), which is most of the churn on main.
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.github/**'
      - 'LICENSE'
      - 'logo.*'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build --stacktrace

      # Upload each loader's real mod jar as its own artifact, so the Actions run page
      # lists them separately (the root project only emits an empty placeholder jar).
      # Excludes the -sources and -dev* jars.
      - name: Upload Forge jar
        uses: actions/upload-artifact@v4
        with:
          name: ae2nobyproduct-forge
          path: |
            forge/build/libs/*.jar
            !**/*-sources.jar
            !**/*-dev*.jar
          if-no-files-found: error

      - name: Upload Fabric jar
        uses: actions/upload-artifact@v4
        with:
          name: ae2nobyproduct-fabric
          path: |
            fabric/build/libs/*.jar
            !**/*-sources.jar
            !**/*-dev*.jar
          if-no-files-found: error
