name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build --stacktrace

      # Upload the real per-loader mod jars from each module (the root project only
      # produces an empty placeholder jar). Excludes the -sources and -dev* jars.
      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: ae2nobyproduct-jars
          path: |
            forge/build/libs/*.jar
            fabric/build/libs/*.jar
            !**/*-sources.jar
            !**/*-dev*.jar
          if-no-files-found: error
