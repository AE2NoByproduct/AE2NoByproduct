name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Fail fast (before building or publishing) if the release tag and the
      # version in gradle.properties disagree. The published file and the
      # release/CurseForge/Modrinth label must be the same version.
      - name: Verify the release tag matches gradle.properties
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG#v}"
          MOD_VERSION="$(grep -E '^mod_version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')"
          echo "Release tag:                  $TAG (version $TAG_VERSION)"
          echo "gradle.properties mod_version: $MOD_VERSION"
          if [ "$TAG_VERSION" != "$MOD_VERSION" ]; then
            echo "::error::Release tag '$TAG' (version '$TAG_VERSION') does not match gradle.properties mod_version '$MOD_VERSION'. They must be identical. Bump mod_version (or fix the tag) and re-release."
            exit 1
          fi
          echo "Version check passed: $MOD_VERSION"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build --stacktrace

      # Single source of truth for the Minecraft version: gradle.properties.
      # This keeps the published game-version in lockstep with what was actually built.
      - name: Read game version from gradle.properties
        id: props
        run: echo "mc=$(grep -E '^mc_version=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      # GitHub-only escape hatch: if the release notes contain [skip-stores], the jar is
      # still attached to the GitHub Release but CurseForge/Modrinth are skipped. Use this
      # when that version was already published to the stores (an empty id makes mc-publish
      # skip that platform).
      - name: Decide store targets
        id: targets
        env:
          BODY: ${{ github.event.release.body }}
        run: |
          if printf '%s' "$BODY" | grep -qiF '[skip-stores]'; then
            echo "Release marked [skip-stores]: uploading to the GitHub Release only, skipping CurseForge/Modrinth."
            echo "cf=" >> "$GITHUB_OUTPUT"
            echo "mr=" >> "$GITHUB_OUTPUT"
          else
            echo "cf=1590300" >> "$GITHUB_OUTPUT"
            echo "mr=ae2-no-byproduct" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish (GitHub always; CurseForge/Modrinth unless skipped)
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          curseforge-id: ${{ steps.targets.outputs.cf }}
          curseforge-token: ${{ secrets.CF_API_TOKEN }}

          modrinth-id: ${{ steps.targets.outputs.mr }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          # The compiled mod jar (excludes any -sources / -dev jars).
          files: build/libs/!(*-sources|*-dev).jar

          name: ${{ github.event.release.name }}
          version: ${{ github.event.release.tag_name }}
          version-type: release
          changelog: ${{ github.event.release.body }}

          # What this jar actually supports. Update these when loaders / versions change.
          loaders: forge
          game-versions: ${{ steps.props.outputs.mc }}
          java: "17"
