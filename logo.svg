<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AE2 No Byproduct logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c212b"/>
      <stop offset="1" stop-color="#0d1014"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3b455"/>
      <stop offset="1" stop-color="#e29a2c"/>
    </linearGradient>
  </defs>

  <!-- panel -->
  <rect x="6" y="6" width="500" height="500" rx="104" fill="url(#bg)" stroke="#29b6a8" stroke-width="6"/>

  <!-- input cube -->
  <rect x="84" y="194" width="86" height="86" rx="16" fill="#39414f" stroke="#59647a" stroke-width="6"/>
  <rect x="98" y="208" width="58" height="14" rx="7" fill="#4c576a"/>

  <!-- arrow -->
  <path d="M188 237 H300" stroke="#d7dde6" stroke-width="18" stroke-linecap="round"/>
  <path d="M298 210 L346 237 L298 264 Z" fill="#d7dde6"/>

  <!-- primary output (kept) -->
  <rect x="356" y="150" width="82" height="82" rx="14" fill="url(#amber)" stroke="#f6cd82" stroke-width="6"/>

  <!-- byproduct output (removed) -->
  <rect x="356" y="300" width="82" height="82" rx="14" fill="#434d5c" stroke="#59647a" stroke-width="6"/>
  <!-- "no" symbol over the byproduct -->
  <circle cx="397" cy="341" r="50" fill="none" stroke="#ec4b40" stroke-width="13"/>
  <path d="M362 306 L432 376" stroke="#ec4b40" stroke-width="13" stroke-linecap="round"/>

  <!-- wordmark -->
  <text x="256" y="452" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="44" font-weight="700" fill="#eef2f7">AE2 No Byproduct</text>
</svg>
