minecraft_version=1.21.1

# NeoForge
neoforge_version=21.1.169

# Architectury API
architectury_version=13.0.8

# Applied Energistics 2. AE2 19.x (1.21.1) dropped the loader suffix (it is NeoForge only), so the
# artifact is plain "appliedenergistics2". 19.2.0-beta is the latest on modmaven; the user runs the
# current AE2 (19.2.x) at runtime, and the APIs we compile against are stable across 19.2.x.
ae2_version=19.2.0-beta
ae2_artifact=appliedenergistics2

# GuideME (AE2's hard dependency) for the dev client. AE2 19.2.x needs GuideME mod-version >= 2.5.1,
# which modmaven does not mirror, so pull it from Modrinth's maven (GuideME 21.1.16 = mod-version 2.5.x).
guideme=maven.modrinth:guideme:21.1.16
